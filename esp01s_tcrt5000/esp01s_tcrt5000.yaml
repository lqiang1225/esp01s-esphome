esphome:
  name: esp01s-tcrt5000
  friendly_name: ESP01S_TCRT5000

esp8266:
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP01S-TCRT5000 AP"
    password: "12345678"

captive_portal:

logger:
  baud_rate: 0
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

i2c:
  sda: GPIO3
  scl: GPIO1
  scan: true

globals:
  - id: detection_count
    type: int
    restore_value: yes
    initial_value: "0"

sensor:
  - platform: template
    name: "Detection Count"
    id: detection_count_sensor
    lambda: |-
      return id(detection_count);
    update_interval: 1s
    unit_of_measurement: "times"
    icon: "mdi:counter"
  - platform: aht10
    variant: AHT20
    temperature:
      name: "Temperature"
      id: temperature
    humidity:
      name: "Humidity"
      id: humidity
    update_interval: 10s

text_sensor:
  - platform: template
    name: "AHT20 Status"
    lambda: |-
      if (id(temperature).has_state()) {
        return "OK";
      }
      return "No I2C data";
    update_interval: 10s

binary_sensor:
  - platform: gpio
    name: "Line Track Sensor"
    id: sensor_track
    pin:
      number: GPIO2
      mode: INPUT
    device_class: presence
    publish_initial_state: true
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: sensor_track
            then:
              - logger.log:
                  format: "Sensor: White Surface"
                  level: INFO
            else:
              - logger.log:
                  format: "Sensor: Black Line DETECTED"
                  level: INFO
              - globals.set:
                  id: detection_count
                  value: !lambda |-
                    return id(detection_count) + 1;
